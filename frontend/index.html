<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Workout Routine Generator</title>
</head>
<body>
    <h1>Personalized Workout Routine Generator</h1>

    <form id="workout-form">
        <label for="goal">Choose Your Goal:</label>
        <select id="goal">
            <option value="weight_loss">Weight Loss</option>
            <option value="muscle_gain">Muscle Gain</option>
            <option value="endurance">Endurance</option>
        </select>
        <br>

        <label for="equipment">Enter Equipment (comma separated):</label>
        <input type="text" id="equipment" required>
        <br>

        <label for="days_per_week">Days per Week (1-7):</label>
        <input type="number" id="days_per_week" min="1" max="7" required>
        <br>

        <button type="submit">Generate Routine</button>
    </form>

    <h2>Your Workout Routine:</h2>
    <ul id="routine-list"></ul>

    <script>
        document.getElementById('workout-form').addEventListener('submit', async (e) => {
            e.preventDefault();

            const goal = document.getElementById('goal').value;
            const equipment = document.getElementById('equipment').value.split(',');
            const daysPerWeek = document.getElementById('days_per_week').value;

            const response = await fetch('http://127.0.0.1:5000/generate-routine', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    goal,
                    equipment,
                    days_per_week: daysPerWeek
                })
            });

            const data = await response.json();
            const routineList = document.getElementById('routine-list');
            routineList.innerHTML = '';

            if (data.workout_routine) {
                data.workout_routine.forEach(exercise => {
                    const li = document.createElement('li');
                    li.textContent = `${exercise.name}: ${exercise.sets} sets of ${exercise.reps}`;
                    routineList.appendChild(li);
                });
            } else {
                routineList.innerHTML = 'No routine found.';
            }
        });
    </script>
</body>
</html>
